<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finite Automata Simulator</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0b0f15;--panel:#0f1520;--surface:#141c28;--border:#1e2d42;--border2:#263550;
  --text:#c8d8f0;--muted:#4a6488;--accent:#3b82f6;--ag:rgba(59,130,246,.18);
  --green:#22c55e;--amber:#f59e0b;--red:#ef4444;
}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;font-size:14px;display:flex;flex-direction:column;height:100vh}
#header{display:flex;align-items:center;padding:0 16px;height:48px;background:var(--panel);border-bottom:1px solid var(--border);gap:12px;flex-shrink:0}
.logo{font-size:15px;font-weight:600;color:#e2eaf5;letter-spacing:-.3px;white-space:nowrap}
.logo span{color:var(--accent)}
.hsep{width:1px;height:20px;background:var(--border)}
.mode-toggle{display:flex;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:3px;gap:2px}
.mode-btn{background:none;border:none;color:var(--muted);font-family:'Outfit',sans-serif;font-size:12px;font-weight:500;padding:4px 12px;border-radius:5px;cursor:pointer;transition:all .15s}
.mode-btn.active{background:var(--accent);color:#fff}
.hdr-right{display:flex;gap:8px;margin-left:auto}
.hdr-btn{background:none;border:1px solid var(--border);color:var(--muted);font-family:'Outfit',sans-serif;font-size:12px;padding:5px 11px;border-radius:7px;cursor:pointer;transition:all .15s}
.hdr-btn:hover{border-color:var(--border2);color:var(--text)}
#main{display:flex;flex:1;overflow:hidden}
#sidebar{width:215px;background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;flex-shrink:0}
.sb-sec{padding:13px 13px;border-bottom:1px solid var(--border)}
.sb-ttl{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
.tool-grid{display:flex;flex-direction:column;gap:3px}
.tool-btn{display:flex;align-items:center;gap:9px;background:none;border:1px solid transparent;color:var(--text);font-family:'Outfit',sans-serif;font-size:13px;padding:7px 9px;border-radius:7px;cursor:pointer;transition:all .15s;width:100%;text-align:left}
.tool-btn:hover{background:var(--surface);border-color:var(--border)}
.tool-btn.active{background:var(--ag);border-color:var(--accent);color:#a0c4ff}
.tkbd{margin-left:auto;font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;background:var(--surface);border:1px solid var(--border);border-radius:3px;padding:1px 4px}
#tool-hint{font-size:11px;color:var(--muted);margin-top:9px;line-height:1.6;min-height:30px}
.inp-lbl{font-size:11px;color:var(--muted);font-weight:500;margin-bottom:5px}
#input-str{background:var(--surface);border:1px solid var(--border);border-radius:7px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:13px;padding:7px 10px;outline:none;width:100%;transition:border-color .15s;margin-bottom:9px}
#input-str:focus{border-color:var(--accent)}
.sim-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:9px}
.sim-btn{background:var(--surface);border:1px solid var(--border);color:var(--text);font-family:'Outfit',sans-serif;font-size:12px;padding:7px 4px;border-radius:7px;cursor:pointer;transition:all .15s;text-align:center}
.sim-btn:hover{border-color:var(--border2);background:var(--border)}
.sim-btn.run-btn{background:var(--accent);border-color:var(--accent);color:#fff;grid-column:1/-1}
.sim-btn.run-btn:hover{opacity:.85}
.sim-btn:disabled{opacity:.35;cursor:not-allowed}
#sim-status{font-size:12px;padding:6px 8px;border-radius:6px;text-align:center;font-weight:500;display:none;margin-bottom:6px}
#sim-status.ok{background:rgba(34,197,94,.14);color:var(--green);display:block}
#sim-status.fail{background:rgba(239,68,68,.12);color:var(--red);display:block}
#sim-status.step{background:rgba(245,158,11,.12);color:var(--amber);display:block}
#sim-status.info{background:var(--surface);color:var(--muted);display:block}
#step-info{font-size:11px;color:var(--muted);text-align:center;margin-bottom:6px;min-height:16px}
#tape-wrap{display:none}
#tape{display:flex;flex-wrap:wrap;gap:3px;margin-top:6px}
.tc{width:22px;height:22px;display:flex;align-items:center;justify-content:center;background:var(--surface);border:1px solid var(--border);border-radius:4px;font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:500;transition:all .2s}
.tc.cur{background:var(--amber);border-color:var(--amber);color:#000}
.tc.done{opacity:.35}
#active-wrap{display:none;margin-top:8px}
#active-states{display:flex;flex-wrap:wrap;gap:4px;margin-top:5px}
.sbadge{background:rgba(245,158,11,.13);border:1px solid rgba(245,158,11,.4);color:var(--amber);font-family:'JetBrains Mono',monospace;font-size:12px;padding:2px 8px;border-radius:4px}
.sbadge.acc{background:rgba(34,197,94,.13);border-color:rgba(34,197,94,.4);color:var(--green)}
#sel-sec{display:none}
.prop-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.prop-lbl{font-size:12px;color:var(--muted)}
.ptog{display:flex;background:var(--surface);border:1px solid var(--border);border-radius:6px;overflow:hidden}
.ptog button{background:none;border:none;color:var(--muted);font-size:12px;padding:4px 10px;cursor:pointer;transition:all .15s;font-family:'Outfit',sans-serif}
.ptog button.on{background:var(--ag);color:var(--accent)}
.ptog button.on.g{background:rgba(34,197,94,.13);color:var(--green)}
#sel-lbl{background:var(--surface);border:1px solid var(--border);color:var(--text);font-family:'JetBrains Mono',monospace;font-size:13px;padding:6px 8px;border-radius:6px;width:100%;outline:none;margin-top:4px}
#sel-lbl:focus{border-color:var(--accent)}
.del-btn{width:100%;margin-top:8px;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:var(--red);font-family:'Outfit',sans-serif;font-size:12px;padding:6px;border-radius:6px;cursor:pointer;transition:all .15s}
.del-btn:hover{background:rgba(239,68,68,.2)}
#canvas-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative}
#canvas{flex:1;height:0;display:block;cursor:default;min-height:0}
#table-panel{flex-shrink:0;height:220px;overflow:hidden;background:var(--panel);border-top:1px solid var(--border)}
#table-inner{height:100%;display:flex;flex-direction:column}
.tbl-header{display:flex;align-items:center;padding:8px 14px 6px;gap:10px;flex-shrink:0;border-bottom:1px solid var(--border)}
.tbl-title{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
.tbl-legend{display:flex;gap:12px;margin-left:auto;font-size:10px;color:var(--muted)}
.tbl-legend span{display:flex;align-items:center;gap:4px}
.leg-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
#table-scroll{overflow:auto;flex:1}
#trans-table{border-collapse:collapse;width:100%;font-family:'JetBrains Mono',monospace;font-size:12px}
#trans-table th,#trans-table td{padding:5px 12px;text-align:center;border-right:1px solid var(--border);white-space:nowrap}
#trans-table th{background:var(--surface);color:var(--muted);font-weight:500;font-size:11px;position:sticky;top:0;z-index:2;border-bottom:1px solid var(--border2)}
#trans-table th.sym-col{color:var(--accent)}
#trans-table td:first-child{text-align:left;background:var(--surface);position:sticky;left:0;z-index:1;border-right:1px solid var(--border2);min-width:90px}
#trans-table th:first-child{z-index:3;left:0;position:sticky}
#trans-table tr:not(:last-child) td{border-bottom:1px solid var(--border)}
#trans-table tr.row-active td{background:rgba(245,158,11,.1)!important}
#trans-table tr.row-active td:first-child{background:rgba(245,158,11,.18)!important;color:var(--amber)}
#trans-table td.col-active{background:rgba(59,130,246,.1)!important}
#trans-table tr.row-active td.col-active{background:rgba(245,158,11,.25)!important}
#trans-table td.cell-taken{color:var(--amber);font-weight:600}
.state-tag{display:inline-flex;align-items:center;gap:3px}
.tag-start{color:var(--accent);font-size:10px}
.tag-acc{color:var(--green);font-size:10px}
.cell-empty{color:var(--muted);opacity:.4}
.tbl-close{background:none;border:none;color:var(--muted);cursor:pointer;font-size:14px;padding:2px 6px;border-radius:4px;transition:color .15s;line-height:1}
.tbl-close:hover{color:var(--text)}
#trans-table td.cell-editable{cursor:pointer;transition:background .12s}
#trans-table td.cell-editable:hover{background:rgba(59,130,246,.1)!important}
#trans-table td.cell-editable:hover .cell-val{color:var(--text)}
.cell-val{transition:color .12s;color:inherit}
.cell-input{background:var(--bg);border:1px solid var(--accent);border-radius:4px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:12px;padding:2px 6px;width:100%;min-width:60px;outline:none;box-shadow:0 0 0 2px rgba(59,130,246,.2)}
.cell-input.newsym{min-width:48px;width:56px}
th.col-new{cursor:pointer;color:var(--muted)!important;transition:color .12s}
th.col-new:hover{color:var(--accent)!important}
th.col-new-editing{padding:4px 6px}
.tbl-err{font-size:10px;color:var(--red);margin-top:3px;display:none}
.tbl-err.show{display:block}
.cell-hint{font-size:10px;color:var(--muted);margin-top:6px;line-height:1.5}
#sym-ov{position:absolute;background:var(--panel);border:1px solid var(--border2);border-radius:10px;padding:12px 14px;display:none;z-index:100;box-shadow:0 8px 32px rgba(0,0,0,.6);min-width:195px}
#sym-ov.show{display:block}
.sym-ttl{font-size:10px;color:var(--muted);margin-bottom:8px;font-weight:600;letter-spacing:.06em;text-transform:uppercase}
#sym-input{background:var(--surface);border:1px solid var(--accent);border-radius:7px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:14px;padding:7px 10px;width:100%;outline:none;margin-bottom:8px}
.sym-row{display:flex;gap:7px}
.sym-ok,.sym-no{flex:1;padding:6px;border-radius:6px;font-family:'Outfit',sans-serif;font-size:13px;cursor:pointer;border:1px solid;transition:all .15s}
.sym-ok{background:var(--accent);border-color:var(--accent);color:#fff}
.sym-ok:hover{opacity:.85}
.sym-no{background:none;border-color:var(--border2);color:var(--muted)}
.sym-no:hover{color:var(--text)}
#ctx-menu{position:absolute;background:var(--panel);border:1px solid var(--border2);border-radius:10px;padding:6px;display:none;z-index:200;box-shadow:0 8px 32px rgba(0,0,0,.6);min-width:165px}
#ctx-menu.show{display:block}
.ctx-it{padding:7px 12px;border-radius:6px;font-size:13px;cursor:pointer;transition:background .1s;color:var(--text)}
.ctx-it:hover{background:var(--surface)}
.ctx-it.danger{color:var(--red)}
.ctx-sep{height:1px;background:var(--border);margin:4px 0}
</style>
</head>
<body>
<div id="header">
  <div class="logo">FA <span>Simulator</span></div>
  <div class="hsep"></div>
  <div class="mode-toggle">
    <button class="mode-btn active" onclick="setAutomataMode('DFA')">DFA</button>
    <button class="mode-btn" onclick="setAutomataMode('NFA')">NFA</button>
  </div>
  <div class="hdr-right">
    <button class="hdr-btn" onclick="loadExample()">Load Example</button>
    <button class="hdr-btn" onclick="clearAll()">Clear All</button>
    <button class="hdr-btn" onclick="showHelp()">Help</button>
  </div>
</div>
<div id="main">
  <div id="sidebar">
    <div class="sb-sec">
      <div class="sb-ttl">Tools</div>
      <div class="tool-grid">
        <button class="tool-btn active" data-tool="select" onclick="setTool('select')">
          <span class="tool-icon">↖</span> Select / Move <span class="tkbd">S</span>
        </button>
        <button class="tool-btn" data-tool="addState" onclick="setTool('addState')">
          <span class="tool-icon">⊕</span> Add State <span class="tkbd">A</span>
        </button>
        <button class="tool-btn" data-tool="addTransition" onclick="setTool('addTransition')">
          <span class="tool-icon">→</span> Add Transition <span class="tkbd">T</span>
        </button>
        <button class="tool-btn" data-tool="delete" onclick="setTool('delete')">
          <span class="tool-icon">✕</span> Delete <span class="tkbd">D</span>
        </button>
      </div>
      <div id="tool-hint">Click canvas to place states</div>
    </div>
    <div class="sb-sec">
      <div class="sb-ttl">Simulation</div>
      <div class="inp-lbl">Input String</div>
      <input id="input-str" type="text" placeholder="e.g.  1 0 1 0" spellcheck="false">
      <div class="sim-grid">
        <button class="sim-btn run-btn" onclick="runSim()">▶ Run</button>
        <button class="sim-btn" id="btn-step" onclick="stepForward()" disabled>Step →</button>
        <button class="sim-btn" id="btn-back" onclick="stepBack()" disabled>← Back</button>
        <button class="sim-btn" id="btn-reset" onclick="resetSim()" disabled>↺ Reset</button>
      </div>
      <div id="sim-status"></div>
      <div id="step-info"></div>
      <div id="tape-wrap">
        <div class="sb-ttl">Tape</div>
        <div id="tape"></div>
      </div>
      <div id="active-wrap">
        <div class="sb-ttl">Active States</div>
        <div id="active-states"></div>
      </div>
    </div>
    <div class="sb-sec" id="sel-sec">
      <div class="sb-ttl">State Properties</div>
      <div class="prop-row">
        <span class="prop-lbl">Start State</span>
        <div class="ptog">
          <button id="tog-start-on" class="on" onclick="setProp('isStart',true)">Yes</button>
          <button id="tog-start-off" onclick="setProp('isStart',false)">No</button>
        </div>
      </div>
      <div class="prop-row">
        <span class="prop-lbl">Accept State</span>
        <div class="ptog">
          <button id="tog-acc-on" class="on g" onclick="setProp('isAccept',true)">Yes</button>
          <button id="tog-acc-off" onclick="setProp('isAccept',false)">No</button>
        </div>
      </div>
      <div class="inp-lbl">Label</div>
      <input id="sel-lbl" type="text" maxlength="6" oninput="updateLabel(this.value)">
      <button class="del-btn" onclick="deleteSelected()">Delete State</button>
    </div>
  </div>
  <div id="canvas-wrap">
    <svg id="canvas"></svg>
    <div id="table-panel">
      <div id="table-inner">
        <div class="tbl-header">
          <span class="tbl-title">Transition Table</span>
          <div class="tbl-legend">
            <span><span class="leg-dot" style="background:var(--accent)"></span> Start</span>
            <span><span class="leg-dot" style="background:var(--green)"></span> Accept</span>
            <span><span class="leg-dot" style="background:var(--amber)"></span> Active</span>
          </div>
          <button class="tbl-close" style="visibility:hidden">✕</button>
        </div>
        <div id="table-scroll"><table id="trans-table"></table></div>
      </div>
    </div>
    <div id="sym-ov">
      <div class="sym-ttl">Transition Symbol</div>
      <input id="sym-input" type="text" placeholder="Symbol (ε = epsilon)" maxlength="12">
      <div class="sym-row">
        <button class="sym-ok" onclick="confirmSym()">Add</button>
        <button class="sym-no" onclick="cancelSym()">Cancel</button>
      </div>
    </div>
    <div id="ctx-menu">
      <div class="ctx-it" id="ctx-start" onclick="ctxSetStart()">Set as Start State</div>
      <div class="ctx-it" id="ctx-accept" onclick="ctxToggleAccept()">Toggle Accept State</div>
      <div class="ctx-sep"></div>
      <div class="ctx-it" id="ctx-rename" onclick="ctxRename()">Rename</div>
      <div class="ctx-sep"></div>
      <div class="ctx-it danger" onclick="ctxDelete()">Delete</div>
    </div>
  </div>
</div>
<script>
const R = 32, AH = 9;
let states = [], transitions = [], nextSid = 0, nextTid = 0;
let tool = 'select', automataMode = 'DFA';
let selectedId = null, transFrom = null;
let isDragging = false, dragId = null, dragOff = {x:0,y:0};
let isPanning = false, panStart = {x:0,y:0};
let pan = {x:0,y:0}, zoom = 1;
let mouseWorld = {x:0,y:0};
let simSteps = [], simPos = -1, simActive = false;
let ctxStateId = null;
const svg = document.getElementById('canvas');

let showTable = true;
let manualSymbols = new Set(); // columns added via + button
let editingCell = null;        // {fromId, sym} | null
let editingNewSym = false;     // true when the + column header input is open

// ─── COORDINATE UTILS ───────────────────────────────────────
function toWorld(cx, cy) {
  const rect = svg.getBoundingClientRect();
  return { x: (cx - rect.left - pan.x) / zoom, y: (cy - rect.top - pan.y) / zoom };
}
function toScreen(wx, wy) {
  return { x: wx * zoom + pan.x, y: wy * zoom + pan.y };
}

// ─── RENDER ─────────────────────────────────────────────────
function render() {
  const w = svg.clientWidth, h = svg.clientHeight;
  const activeSet = simActive && simPos >= 0 ? simSteps[simPos].states : new Set();
  const takenTrans = simActive && simPos > 0 ? simSteps[simPos].taken : new Set();

  let html = `<defs>
    ${marker('arr','#4a6488')}${marker('arr-accent','#3b82f6')}${marker('arr-amber','#f59e0b')}${marker('arr-green','#22c55e')}
  </defs>
  <rect id="bg-rect" x="0" y="0" width="${w}" height="${h}" fill="transparent" style="cursor:inherit"/>
  <g id="world" transform="translate(${pan.x},${pan.y}) scale(${zoom})">`;

  // Transitions layer
  for (const t of transitions) {
    const from = states.find(s => s.id === t.from), to = states.find(s => s.id === t.to);
    if (!from || !to) continue;
    const isTaken = takenTrans.has(t.id);
    const hasBoth = transitions.some(x => x.from === t.to && x.to === t.from);
    html += renderTransition(t, from, to, isTaken, hasBoth);
  }

  // Ghost transition line
  if (transFrom !== null) {
    const from = states.find(s => s.id === transFrom);
    if (from) {
      const dx = mouseWorld.x - from.x, dy = mouseWorld.y - from.y;
      const dist = Math.sqrt(dx*dx+dy*dy) || 1;
      const ex = from.x + dx/dist*(dist - R - 5), ey = from.y + dy/dist*(dist - R - 5);
      html += `<line x1="${from.x}" y1="${from.y}" x2="${ex}" y2="${ey}" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="6 4" opacity="0.6"/>`;
    }
  }

  // States layer
  for (const s of states) {
    html += renderState(s, activeSet, takenTrans);
  }
  html += '</g>';
  svg.innerHTML = html;
  reattach();
  renderTable();
}

function marker(id, col) {
  return `<marker id="${id}" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="${col}"/>
  </marker>`;
}

function renderState(s, activeSet, takenTrans) {
  const isActive = activeSet.has(s.id);
  const isSelected = selectedId === s.id;
  let strokeCol = '#1e3550', strokeW = 1.5, fillCol = '#0f1a2a';
  if (isActive) { strokeCol = '#f59e0b'; strokeW = 2.5; fillCol = 'rgba(245,158,11,.12)'; }
  else if (isSelected) { strokeCol = '#3b82f6'; strokeW = 2; }
  else if (s.isAccept) { strokeCol = '#22c55e'; }
  else if (s.isStart) { strokeCol = '#3b82f6'; }
  const textCol = isActive ? '#f59e0b' : (isSelected ? '#a0c4ff' : '#c8d8f0');
  let out = `<g data-sid="${s.id}" style="cursor:pointer">`;
  // start arrow
  if (s.isStart) {
    out += `<line x1="${s.x-70}" y1="${s.y}" x2="${s.x-R-1}" y2="${s.y}" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arr-accent)"/>`;
  }
  // double ring for accept
  if (s.isAccept) {
    const acol = isActive ? '#f59e0b' : '#22c55e';
    out += `<circle cx="${s.x}" cy="${s.y}" r="${R+6}" fill="none" stroke="${acol}" stroke-width="1.5" opacity="0.7"/>`;
  }
  out += `<circle cx="${s.x}" cy="${s.y}" r="${R}" fill="${fillCol}" stroke="${strokeCol}" stroke-width="${strokeW}"/>`;
  out += `<text x="${s.x}" y="${s.y}" text-anchor="middle" dominant-baseline="central" fill="${textCol}" font-family="'JetBrains Mono',monospace" font-size="13" font-weight="500">${esc(s.label)}</text>`;
  out += '</g>';
  return out;
}

function renderTransition(t, from, to, isTaken, hasBoth) {
  const col = isTaken ? '#f59e0b' : '#2a4060';
  const mk = isTaken ? 'arr-amber' : 'arr';
  const sw = isTaken ? 2.5 : 1.5;
  const label = t.symbols.join(', ');
  let path, lx, ly;

  if (from.id === to.id) {
    // Self-loop
    const cx = from.x, cy = from.y;
    const a1 = -2.2, a2 = -0.94;
    const sx = cx + R*Math.cos(a1), sy = cy + R*Math.sin(a1);
    const ex = cx + R*Math.cos(a2), ey = cy + R*Math.sin(a2);
    const top = cy - R - 52;
    path = `M ${sx} ${sy} C ${sx-28} ${top+6} ${ex+28} ${top+6} ${ex} ${ey}`;
    lx = cx; ly = top - 8;
  } else {
    const dx = to.x - from.x, dy = to.y - from.y;
    const dist = Math.sqrt(dx*dx + dy*dy) || 1;
    const nx = dx/dist, ny = dy/dist;
    const sx = from.x + nx*R, sy = from.y + ny*R;
    let ex, ey, cpx, cpy;
    if (hasBoth) {
      const perp = 38;
      cpx = (sx+to.x)/2 - ny*perp;
      cpy = (sy+to.y)/2 + nx*perp;
      const tdx = to.x - cpx, tdy = to.y - cpy;
      const tl = Math.sqrt(tdx*tdx+tdy*tdy)||1;
      ex = to.x - tdx/tl*(R+AH);
      ey = to.y - tdy/tl*(R+AH);
      path = `M ${sx} ${sy} Q ${cpx} ${cpy} ${ex} ${ey}`;
      lx = 0.5*(0.5*(sx+cpx*2+ex))-ny*perp*0.3;
      ly = 0.5*(0.5*(sy+cpy*2+ey))+nx*perp*0.3;
    } else {
      ex = to.x - nx*(R+AH);
      ey = to.y - ny*(R+AH);
      cpx = (sx+ex)/2; cpy = (sy+ey)/2;
      path = `M ${sx} ${sy} L ${ex} ${ey}`;
      lx = cpx - ny*14; ly = cpy + nx*14;
    }
  }

  let out = `<path d="${path}" fill="none" stroke="${col}" stroke-width="${sw}" marker-end="url(#${mk})" data-tid="${t.id}" style="cursor:pointer"/>`;
  // Label background + text
  const labelW = label.length * 7.5 + 16;
  out += `<rect x="${lx - labelW/2}" y="${ly-9}" width="${labelW}" height="17" rx="4" fill="#0b0f15" opacity="0.85"/>`;
  out += `<text x="${lx}" y="${ly+1}" text-anchor="middle" dominant-baseline="central" fill="${isTaken?'#f59e0b':'#6a90c0'}" font-family="'JetBrains Mono',monospace" font-size="11" data-tid="${t.id}" style="cursor:pointer">${esc(label)}</text>`;
  return out;
}

function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ─── EVENT REATTACH ──────────────────────────────────────────
function reattach() {
  document.getElementById('bg-rect').addEventListener('mousedown', onBgDown);
  svg.querySelectorAll('[data-sid]').forEach(el => {
    el.addEventListener('mousedown', e => { e.stopPropagation(); onStateDown(e, +el.dataset.sid); });
    el.addEventListener('contextmenu', e => { e.preventDefault(); e.stopPropagation(); showCtxMenu(e, +el.dataset.sid); });
  });
  svg.querySelectorAll('[data-tid]').forEach(el => {
    el.addEventListener('click', e => { e.stopPropagation(); onTransClick(+el.dataset.tid); });
  });
}

// ─── MOUSE EVENTS ────────────────────────────────────────────
svg.addEventListener('mousemove', e => {
  const w = toWorld(e.clientX, e.clientY);
  mouseWorld = w;
  if (isDragging && dragId !== null) {
    const s = states.find(s => s.id === dragId);
    if (s) { s.x = w.x + dragOff.x; s.y = w.y + dragOff.y; render(); }
  } else if (isPanning) {
    pan.x = e.clientX - panStart.x;
    pan.y = e.clientY - panStart.y;
    render();
  } else if (transFrom !== null) {
    render();
  }
});
svg.addEventListener('mouseup', () => { isDragging = false; dragId = null; isPanning = false; });
svg.addEventListener('mouseleave', () => { isDragging = false; isPanning = false; });
svg.addEventListener('wheel', e => {
  e.preventDefault();
  const rect = svg.getBoundingClientRect();
  const mx = e.clientX - rect.left, my = e.clientY - rect.top;
  const factor = e.deltaY < 0 ? 1.1 : 0.9;
  const newZoom = Math.min(Math.max(zoom * factor, 0.2), 4);
  pan.x = mx - (mx - pan.x) * (newZoom/zoom);
  pan.y = my - (my - pan.y) * (newZoom/zoom);
  zoom = newZoom;
  render();
}, {passive:false});
svg.addEventListener('contextmenu', e => e.preventDefault());
document.addEventListener('click', () => hideCtx());

function onBgDown(e) {
  if (e.button !== 0) return;
  hideCtx();
  const w = toWorld(e.clientX, e.clientY);
  if (tool === 'addState') {
    addState(w.x, w.y);
  } else if (tool === 'addTransition') {
    if (transFrom !== null) { transFrom = null; render(); updateHint(); }
  } else {
    if (selectedId !== null) { selectedId = null; updateSelPanel(); render(); }
    isPanning = true;
    panStart = { x: e.clientX - pan.x, y: e.clientY - pan.y };
  }
}

function onStateDown(e, id) {
  if (e.button !== 0) return;
  hideCtx();
  if (simActive) return;
  if (tool === 'addTransition') {
    if (transFrom === null) {
      transFrom = id;
      updateHint();
      render();
    } else if (transFrom === id || true) {
      // Show symbol input
      const from = states.find(s => s.id === transFrom);
      const to = states.find(s => s.id === id);
      showSymInput(e.clientX, e.clientY, transFrom, id);
    }
    return;
  }
  if (tool === 'delete') { deleteState(id); return; }
  if (tool === 'select') {
    selectedId = id;
    updateSelPanel();
    render();
    isDragging = true;
    dragId = id;
    const s = states.find(s => s.id === id);
    const w = toWorld(e.clientX, e.clientY);
    dragOff = { x: s.x - w.x, y: s.y - w.y };
  }
}

function onTransClick(id) {
  if (tool === 'delete') deleteTransition(id);
}

// ─── STATE / TRANSITION CRUD ─────────────────────────────────
function addState(x, y) {
  const label = 'q' + nextSid;
  const isStart = states.length === 0;
  states.push({ id: nextSid++, x, y, label, isStart, isAccept: false });
  render();
}

function deleteState(id) {
  states = states.filter(s => s.id !== id);
  transitions = transitions.filter(t => t.from !== id && t.to !== id);
  if (selectedId === id) { selectedId = null; updateSelPanel(); }
  render();
}

function deleteTransition(id) {
  transitions = transitions.filter(t => t.id !== id);
  render();
}

function deleteSelected() {
  if (selectedId !== null) { deleteState(selectedId); }
}

function addTransition(fromId, toId, symbol) {
  const sym = symbol.trim() || 'ε';
  const existing = transitions.find(t => t.from === fromId && t.to === toId);
  if (existing) {
    if (!existing.symbols.includes(sym)) existing.symbols.push(sym);
  } else {
    transitions.push({ id: nextTid++, from: fromId, to: toId, symbols: [sym] });
  }
  transFrom = null;
  render();
}
function addTransitionRaw(fromId, toId, symbol) {
  const sym = symbol.trim() || 'ε';
  const existing = transitions.find(t => t.from === fromId && t.to === toId);
  if (existing) {
    if (!existing.symbols.includes(sym)) existing.symbols.push(sym);
  } else {
    transitions.push({ id: nextTid++, from: fromId, to: toId, symbols: [sym] });
  }
}

// ─── SYMBOL INPUT OVERLAY ────────────────────────────────────
let symFrom = null, symTo = null;

  const ov = document.getElementById('sym-ov');

  ov.classList.add('show');

}
function confirmSym() {

}
function cancelSym() {

}
document.getElementById('sym-input').addEventListener('keydown', e => {

});

function showCtxMenu(e, id) {

function hideCtx() { document.getElementById('ctx-menu').classList.remove('show'); }
function ctxSetStart() {

function ctxToggleAccept() {

// ─── PROPERTIES PANEL ────────────────────────────────────────
function updateSelPanel() {
  const sec = document.getElementById('sel-sec');
  if (selectedId === null) { sec.style.display = 'none'; return; }

  document.getElementById('tog-acc-off').className = !s.isAccept ? 'on' : '';

}
function setProp(prop, val) {

// ─── TOOL / MODE ─────────────────────────────────────────────
const hints = {
  select: 'Click a state to select it. Drag to move. Right-click for options.',
  addState: 'Click the canvas to place a new state.',
  addTransition: 'Click source state, then click target state.',
  delete: 'Click a state or transition to delete it.'
};
function setTool(t) {
  tool = t; transFrom = null;
  document.querySelectorAll('.tool-btn').forEach(b => b.classList.toggle('active', b.dataset.tool === t));
  const cursors = { select:'default', addState:'crosshair', addTransition:'crosshair', delete:'pointer' };
  svg.className.baseVal = '';
  svg.style.cursor = cursors[t] || 'default';

}
function updateHint() {
  let hint = hints[tool] || '';

    const s = states.find(s => s.id === transFrom);
    hint = `From <b style="color:#a0c4ff">${s?.label||'?'}</b> — now click the target state.`;
  }

  resetSim();
}

// ─── DFA SIMULATION ──────────────────────────────────────────
function buildDFASteps(input) {
  const start = states.find(s => s.isStart);
  if (!start) return null;
  const steps = [{ states: new Set([start.id]), taken: new Set(), pos: -1, msg: `Start: ${start.label}` }];
  let cur = start.id;
  for (let i = 0; i < input.length; i++) {
    const sym = input[i];
    const t = transitions.find(t => t.from === cur && t.symbols.includes(sym));
    if (!t) {
      steps.push({ states: new Set(), taken: new Set(), pos: i, msg: `No transition from state on '${sym}' — REJECTED`, dead: true });
      return steps;
    }
    steps.push({ states: new Set([t.to]), taken: new Set([t.id]), pos: i, msg: `${sym} → ${states.find(s=>s.id===t.to)?.label}` });
    cur = t.to;
  }
  const finalState = states.find(s => s.id === cur);
  steps[steps.length-1].final = true;
  steps[steps.length-1].accepted = finalState?.isAccept || false;
  return steps;
}

// ─── NFA SIMULATION ──────────────────────────────────────────
function epsClosure(ids) {
  const c = new Set(ids);
  const stk = [...ids];
  while (stk.length) {
    const s = stk.pop();
    transitions.filter(t => t.from === s && t.symbols.includes('ε')).forEach(t => {
      if (!c.has(t.to)) { c.add(t.to); stk.push(t.to); }
    });
  }
  return c;
}
function buildNFASteps(input) {
  const start = states.find(s => s.isStart);
  if (!start) return null;
  const init = epsClosure([start.id]);
  const steps = [{ states: init, taken: new Set(), pos: -1, msg: `Start: {${[...init].map(id=>states.find(s=>s.id===id)?.label).join(',')}}` }];
  let cur = init;
  for (let i = 0; i < input.length; i++) {
    const sym = input[i];
    const nextIds = new Set(), takenIds = new Set();
    for (const sid of cur) {
      transitions.filter(t => t.from === sid && t.symbols.includes(sym)).forEach(t => {
        nextIds.add(t.to); takenIds.add(t.id);
      });
    }
    const next = epsClosure([...nextIds]);
    const lbls = [...next].map(id => states.find(s=>s.id===id)?.label).join(',');
    steps.push({ states: next, taken: takenIds, pos: i, msg: next.size ? `${sym} → {${lbls}}` : `${sym} → ∅ (dead)` });
    cur = next;
    if (cur.size === 0) {
      steps[steps.length-1].dead = true; break;
    }
  }
  const last = steps[steps.length-1];
  last.final = true;
  last.accepted = [...last.states].some(id => states.find(s=>s.id===id)?.isAccept);
  return steps;
}

// ─── SIM CONTROLS ────────────────────────────────────────────
function runSim() {
  if (states.length === 0) { showStatus('info', 'Add states first'); return; }
  const input = document.getElementById('input-str').value.replace(/\s+/g,'').split('');
  simSteps = automataMode === 'DFA' ? buildDFASteps(input) : buildNFASteps(input);
  if (!simSteps) { showStatus('info', 'Set a start state first'); return; }
  simActive = true; simPos = simSteps.length - 1;
  updateSimUI(); render();
}
function stepForward() {
  if (!simActive) {
    const input = document.getElementById('input-str').value.replace(/\s+/g,'').split('');
    simSteps = automataMode === 'DFA' ? buildDFASteps(input) : buildNFASteps(input);
    if (!simSteps) { showStatus('info', 'Set a start state first'); return; }
    simActive = true; simPos = -1;
  }
  if (simPos < simSteps.length - 1) { simPos++; updateSimUI(); render(); }
}
function stepBack() {
  if (simPos > 0) { simPos--; updateSimUI(); render(); }
}
function resetSim() {
  simActive = false; simPos = -1; simSteps = [];
  document.getElementById('sim-status').className = '';
  document.getElementById('sim-status').style.display = 'none';
  document.getElementById('step-info').textContent = '';
  document.getElementById('tape-wrap').style.display = 'none';
  document.getElementById('active-wrap').style.display = 'none';
  document.getElementById('btn-step').disabled = false;
  document.getElementById('btn-back').disabled = true;
  document.getElementById('btn-reset').disabled = true;
  render();
}
function updateSimUI() {
  if (simPos < 0 || !simSteps.length) return;
  const step = simSteps[simPos];
  document.getElementById('btn-back').disabled = simPos <= 0;
  document.getElementById('btn-step').disabled = simPos >= simSteps.length-1;
  document.getElementById('btn-reset').disabled = false;
  const input = document.getElementById('input-str').value.replace(/\s+/g,'');

  // Status
  if (step.final) {
    if (step.accepted) showStatus('ok', '✓ ACCEPTED');
    else showStatus('fail', '✗ REJECTED');
  } else if (step.dead) {
    showStatus('fail', '✗ REJECTED (dead state)');
  } else {
    showStatus('step', step.msg || `Step ${simPos}`);
  }
  document.getElementById('step-info').textContent = simPos > 0 ? `Step ${simPos} / ${simSteps.length-1}` : 'Initial state';

  // Tape
  const tw = document.getElementById('tape-wrap');
  const tape = document.getElementById('tape');
  if (input.length > 0) {
    tw.style.display = 'block';
    tape.innerHTML = [...input].map((ch, i) => {
      const cls = i === step.pos ? 'tc cur' : (i < step.pos ? 'tc done' : 'tc');
      return `<div class="${cls}">${esc(ch)}</div>`;
    }).join('');
  } else { tw.style.display = 'none'; }

  // Active states
  const aw = document.getElementById('active-wrap');
  const as_ = document.getElementById('active-states');
  if (step.states.size > 0) {
    aw.style.display = 'block';
    as_.innerHTML = [...step.states].map(id => {
      const s = states.find(s=>s.id===id);
      const cls = s?.isAccept ? 'sbadge acc' : 'sbadge';
      return `<div class="${cls}">${esc(s?.label||'?')}</div>`;
    }).join('');
  } else { aw.style.display = 'none'; }
}
function showStatus(cls, msg) {
  const el = document.getElementById('sim-status');
  el.className = cls; el.textContent = msg; el.style.display = 'block';
}

// ─── TRANSITION TABLE ────────────────────────────────────────
function toggleTable() {
  showTable = !showTable;
  document.getElementById('table-panel').classList.toggle('open', showTable);
  document.getElementById('btn-table').style.color = showTable ? 'var(--accent)' : '';
  document.getElementById('btn-table').style.borderColor = showTable ? 'var(--accent)' : '';
  if (showTable) renderTable();
  setTimeout(render, 210);
}

function getAlphabet() {
  const symSet = new Set(manualSymbols);
  transitions.forEach(t => t.symbols.forEach(s => symSet.add(s)));
  return [...symSet].sort((a, b) => {
    if (a === 'ε') return 1; if (b === 'ε') return -1;
    return a.localeCompare(b);
  });
}

function renderTable() {
  if (!showTable) return;
  const tbl = document.getElementById('trans-table');
  const alphabet = getAlphabet();
  const activeSet = simActive && simPos >= 0 ? simSteps[simPos].states : new Set();
  const takenTrans = simActive && simPos > 0 ? simSteps[simPos].taken : new Set();
  const currentSym = (simActive && simPos > 0 && simSteps[simPos].pos >= 0)
    ? document.getElementById('input-str').value.replace(/\s+/g,'')[simSteps[simPos].pos]
    : null;

  if (states.length === 0) {
    tbl.innerHTML = `<tr><td colspan="99" style="padding:16px 14px;color:var(--muted);font-family:'Outfit',sans-serif;font-size:12px">
      Add states to the diagram — transitions you create will appear here as editable cells.
    </td></tr>`;
    return;
  }

  // ── Header ──
  let html = '<thead><tr><th>State</th>';
  alphabet.forEach(sym => {
    const isActive = sym === currentSym;
    html += `<th class="sym-col${isActive?' col-active':''}">${esc(sym)}</th>`;
  });

  // + column header
  if (!simActive) {
    if (editingNewSym) {
      html += `<th class="col-new-editing"><input id="newsym-inp" class="cell-input newsym" placeholder="sym" title="Type symbol name, press Enter"></th>`;
    } else {
      html += `<th class="col-new" onclick="startNewSym()" title="Add a new symbol column">＋</th>`;
    }
  }
  html += '</tr></thead><tbody>';

  // ── Rows ──
  const sortedStates = [...states].sort((a,b) => {
    if (a.isStart && !b.isStart) return -1; if (!a.isStart && b.isStart) return 1;
    return a.label.localeCompare(b.label);
  });

  for (const s of sortedStates) {
    const isRowActive = activeSet.has(s.id);
    html += `<tr class="${isRowActive ? 'row-active' : ''}">`;

    // State label cell (sticky)
    let stateLabel = '';
    if (s.isStart) stateLabel += '<span class="tag-start" title="Start state">→</span> ';
    if (s.isAccept) stateLabel += '<span class="tag-acc" title="Accept state">★</span> ';
    stateLabel += `<span>${esc(s.label)}</span>`;
    html += `<td><span class="state-tag">${stateLabel}</span></td>`;

    // Transition cells
    for (const sym of alphabet) {
      const isColActive = sym === currentSym;
      const matchTrans = transitions.filter(t => t.from === s.id && t.symbols.includes(sym));
      const destIds = matchTrans.map(t => t.to);
      const isTaken = matchTrans.some(t => takenTrans.has(t.id));
      const baseCls = [isColActive?'col-active':'', isTaken?'cell-taken':''].filter(Boolean).join(' ');

      // Is this cell currently being edited?
      const isEditing = editingCell && editingCell.fromId === s.id && editingCell.sym === sym;

      if (isEditing) {
        // Show input in place of cell value
        const curVal = getCellDisplayValue(s.id, sym, destIds);
        html += `<td class="${baseCls}" style="padding:3px 6px">
          <input id="cell-inp" class="cell-input" value="${esc(curVal)}"
            placeholder="${automataMode==='NFA'?'q0, q1':'q0'}"
            title="Enter state label${automataMode==='NFA'?' (comma-separated for NFA)':''}. Press Enter to confirm, Esc to cancel.">
        </td>`;
      } else if (!simActive) {
        // Editable cell
        const displayHtml = getCellDisplayHtml(s.id, sym, destIds, isTaken);
        html += `<td class="${baseCls} cell-editable" onclick="editCell(${s.id},'${escAttr(sym)}')" title="Click to edit transition">
          <span class="cell-val">${displayHtml}</span>
        </td>`;
      } else {
        // Read-only during simulation
        const displayHtml = getCellDisplayHtml(s.id, sym, destIds, isTaken);
        html += `<td class="${baseCls}"><span class="cell-val">${displayHtml}</span></td>`;
      }
    }

    // + cell for adding new symbol to this row
    if (!simActive) {
      if (editingNewSym) {
        html += `<td style="background:var(--surface);opacity:.4">—</td>`;
      } else {
        html += `<td class="col-new cell-editable" onclick="startNewSymForRow(${s.id})" title="Add transition on new symbol">＋</td>`;
      }
    }

    html += '</tr>';
  }

  // Hint row
  if (!simActive && alphabet.length > 0) {
    html += `<tr><td colspan="${alphabet.length + (simActive?1:2)}" style="padding:6px 12px;border-top:1px solid var(--border)">
      <span class="cell-hint">Click any cell to edit · Enter state label to add transition · Type <code style="font-family:'JetBrains Mono',monospace;color:var(--muted)">-</code> or clear to remove · NFA: comma-separate multiple states</span>
    </td></tr>`;
  }

  html += '</tbody>';
  tbl.innerHTML = html;

  // Attach events to the live inputs (can't use inline handlers with complex args safely)
  const cellInp = document.getElementById('cell-inp');
  if (cellInp) {
    cellInp.focus(); cellInp.select();
    cellInp.addEventListener('keydown', e => {
      if (e.key === 'Enter' || e.key === 'Tab') { e.preventDefault(); confirmCell(cellInp.value); }
      if (e.key === 'Escape') { cancelEdit(); }
    });
    cellInp.addEventListener('blur', () => setTimeout(() => { if (editingCell) confirmCell(cellInp.value); }, 120));
  }

  const nsInp = document.getElementById('newsym-inp');
  if (nsInp) {
    nsInp.focus();
    nsInp.addEventListener('keydown', e => {
      if (e.key === 'Enter') { e.preventDefault(); confirmNewSym(nsInp.value, null); }
      if (e.key === 'Escape') { editingNewSym = false; pendingNewSymRow = null; renderTable(); }
    });
    nsInp.addEventListener('blur', () => setTimeout(() => { if (editingNewSym && nsInp.value.trim()) confirmNewSym(nsInp.value, null); else if (editingNewSym) { editingNewSym = false; renderTable(); } }, 120));
  }
}

function getCellDisplayValue(fromId, sym, destIds) {
  if (destIds.length === 0) return '';
  if (automataMode === 'DFA') {
    const dest = states.find(s => s.id === destIds[0]);
    return dest?.label || '';
  } else {
    return destIds.map(id => states.find(s=>s.id===id)?.label||'?').join(', ');
  }
}

function getCellDisplayHtml(fromId, sym, destIds, isTaken) {
  if (destIds.length === 0) return `<span class="cell-empty">—</span>`;
  if (automataMode === 'DFA') {
    const dest = states.find(s => s.id === destIds[0]);
    const lbl = dest?.label || '?';
    return dest?.isAccept ? `<span style="color:var(--green)">${esc(lbl)}</span>` : esc(lbl);
  } else {
    const labels = destIds.map(id => {
      const d = states.find(s=>s.id===id);
      return d?.isAccept ? `<span style="color:var(--green)">${esc(d.label)}</span>` : esc(d?.label||'?');
    });
    return `{${labels.join(', ')}}`;
  }
}

function escAttr(s) { return s.replace(/'/g,"\\'").replace(/"/g,'&quot;'); }

function editCell(fromId, sym) {
  if (simActive) return;
  editingCell = { fromId, sym };
  editingNewSym = false;
  renderTable();
}

function cancelEdit() {
  editingCell = null;
  editingNewSym = false;
  pendingNewSymRow = null;
  renderTable();
}

function confirmCell(value) {
  if (!editingCell) return;
  const { fromId, sym } = editingCell;
  editingCell = null;
  applyTableEdit(fromId, sym, value);
}

function applyTableEdit(fromId, sym, value) {
  value = (value || '').trim();

  // Remove sym from all transitions originating from fromId
  for (const t of transitions) {
    if (t.from !== fromId) continue;
    const idx = t.symbols.indexOf(sym);
    if (idx !== -1) t.symbols.splice(idx, 1);
  }
  transitions = transitions.filter(t => t.symbols.length > 0);

  // Parse target labels
  const isEmpty = !value || ['-','—','∅','φ','{}'].includes(value);
  if (!isEmpty) {
    const rawLabels = value.split(/[\s,]+/).map(s => s.trim()).filter(Boolean);
    const firstOnly = automataMode === 'DFA' ? [rawLabels[0]] : rawLabels;
    for (const lbl of firstOnly) {
      const target = states.find(s => s.label === lbl);
      if (target) addTransitionRaw(fromId, target.id, sym);
      // If label not found, silently ignore
    }
  }

  // Prune manualSymbols: remove if no transitions use it anymore
  for (const ms of [...manualSymbols]) {
    if (!transitions.some(t => t.symbols.includes(ms))) manualSymbols.delete(ms);
  }

  renderTable();
  render();
}

// ── New symbol column ──────────────────────────────────────
let pendingNewSymRow = null; // fromId to immediately edit after adding sym

function startNewSym() {
  if (simActive) return;
  editingCell = null;
  editingNewSym = true;
  pendingNewSymRow = null;
  renderTable();
}

function startNewSymForRow(fromId) {
  if (simActive) return;
  editingCell = null;
  editingNewSym = true;
  pendingNewSymRow = fromId;
  renderTable();
}

function confirmNewSym(value, fromId) {
  editingNewSym = false;
  const sym = value.trim();
  if (!sym) { pendingNewSymRow = null; renderTable(); return; }
  manualSymbols.add(sym);
  const rowId = fromId ?? pendingNewSymRow;
  pendingNewSymRow = null;
  if (rowId !== null && rowId !== undefined) {
    editingCell = { fromId: rowId, sym };
  }
  renderTable();
}

// ─── UTILS ───────────────────────────────────────────────────
function clearAll() {
  if (states.length && !confirm('Clear all states and transitions?')) return;
  states = []; transitions = []; nextSid = 0; nextTid = 0; selectedId = null;
  manualSymbols = new Set(); editingCell = null; editingNewSym = false; pendingNewSymRow = null;
  resetSim(); updateSelPanel(); render();
}
function loadExample() {
  clearAll();
  const cx = svg.clientWidth/2, cy = svg.clientHeight/2;
  if (automataMode === 'DFA') {
    // DFA: accepts binary strings ending in '1'
    states = [
      {id:0,x:cx-120,y:cy,label:'q0',isStart:true,isAccept:false},
      {id:1,x:cx+120,y:cy,label:'q1',isStart:false,isAccept:true}
    ];
    transitions = [
      {id:0,from:0,to:0,symbols:['0']},
      {id:1,from:0,to:1,symbols:['1']},
      {id:2,from:1,to:0,symbols:['0']},
      {id:3,from:1,to:1,symbols:['1']}
    ];
    nextSid = 2; nextTid = 4;
    document.getElementById('input-str').value = '1010';
    showStatus('info', 'DFA: accepts strings ending in 1');
  } else {
    // NFA: accepts strings over {a,b} ending in 'ab'
    states = [
      {id:0,x:cx-160,y:cy,label:'q0',isStart:true,isAccept:false},
      {id:1,x:cx,y:cy,label:'q1',isStart:false,isAccept:false},
      {id:2,x:cx+160,y:cy,label:'q2',isStart:false,isAccept:true}
    ];
    transitions = [
      {id:0,from:0,to:0,symbols:['a','b']},
      {id:1,from:0,to:1,symbols:['a']},
      {id:2,from:1,to:2,symbols:['b']}
    ];
    nextSid = 3; nextTid = 3;
    document.getElementById('input-str').value = 'aab';
    showStatus('info', 'NFA: accepts strings ending in ab');
  }
  render();
}
function showHelp() {
  alert(
    'FINITE AUTOMATA SIMULATOR\n\n' +
    'TOOLS:\n' +
    '  S — Select: click states to inspect/move them\n' +
    '  A — Add State: click canvas to place states\n' +
    '  T — Add Transition: click source, then target state\n' +
    '  D — Delete: click state/transition to remove\n\n' +
    'RIGHT-CLICK a state to:\n' +
    '  • Set/remove start state\n' +
    '  • Toggle accept state\n' +
    '  • Rename\n\n' +
    'SIMULATION:\n' +
    '  ▶ Run — jump to final result\n' +
    '  Step → — step forward one symbol\n' +
    '  ← Back — step backward\n' +
    '  ↺ Reset — clear simulation\n\n' +
    'PAN: drag background | ZOOM: scroll wheel\n\n' +
    'EPSILON (ε): type "ε" or leave blank for ε-transitions (NFA)'
  );
}

// ─── KEYBOARD SHORTCUTS ──────────────────────────────────────
document.addEventListener('keydown', e => {
  if (['INPUT','TEXTAREA'].includes(e.target.tagName)) return;
  if (e.key === 's' || e.key === 'S') setTool('select');
  if (e.key === 'a' || e.key === 'A') setTool('addState');
  if (e.key === 't' || e.key === 'T') setTool('addTransition');
  if (e.key === 'd' || e.key === 'D') setTool('delete');
  if (e.key === 'Escape') { transFrom = null; setTool('select'); cancelSym(); }
  if (e.key === 'Delete' && selectedId !== null) deleteSelected();
});

// ─── INIT ────────────────────────────────────────────────────
window.addEventListener('resize', render);
loadExample();
</script>
